name: Bug report
description: Something works differently than the README describes.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report. Before filing, please confirm:
        - You're on the [latest release](../../releases).
        - The issue reproduces in a **new file with minimal content** — not only in a huge existing document.
        - You've searched [existing issues](../../issues?q=is%3Aissue) and this one isn't already tracked.

        Bug reports without a clear reproduction are likely to be closed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what actually happened.
      placeholder: |
        1. I opened file X
        2. I pressed Ctrl+Shift+F
        3. I expected Y, but Z happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest markdown file + steps that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Markd version
      description: From the installer filename or `markd.exe --version`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: webview2
    attributes:
      label: WebView2 runtime version
      description: Find via *Apps & Features → Microsoft Edge WebView2 Runtime*.
      placeholder: "e.g., 131.0.2903.112"
  - type: textarea
    id: logs
    attributes:
      label: Devtools console output (optional)
      description: Right-click inside Markd → Inspect Element → Console. Paste any red errors.
      render: shell
